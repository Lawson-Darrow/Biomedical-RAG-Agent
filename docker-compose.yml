# Postgres + pgvector for the dense retrieval store.
# Up:   docker compose up -d
# Down: docker compose down   (add -v to also drop the data volume)
# Matches DATABASE_URL in .env: postgresql://postgres:postgres@localhost:5432/biomed_rag
services:
  db:
    image: pgvector/pgvector:pg17
    container_name: biomed-rag-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biomed_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biomed_rag"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
